name: Lint

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: "Git ref to checkout (optional, defaults to current commit)"

jobs:
  lint:
    name: Lint Go code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6.2.0
        with:
          go-version: '^1'
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Static code analysis
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          skip-cache: true