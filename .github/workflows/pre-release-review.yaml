name: Pre Release Review

# Trigger ONLY on PRs targeting the release branch
on:
  pull_request:
    branches:
      - release
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write # Required for auto-merge
  pull-requests: write # Required to post the comment

env:
  # CONFIGURATION: Change this to your desired reviewer
  # For a person: "octocat"
  # For a team: "my-org/devops-team"
  # For yourself (default): "${{ github.actor }}"
  REVIEWER: "Synertry"
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_LABEL: "status/review-needed,status/approval-pending"
  BASE_REF: ${{ github.event.pull_request.base.ref }}
  HEAD_REF: ${{ github.event.pull_request.head.ref }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generate-summary:
    name: Generate Change Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # We need full history to compare commits

      - name: Generate & Post Summary
        run: |
          echo "📊 Generating Change Report..."

          # 1. Get List of Commits in this PR
          # Formats as: "- [Hash] Author: Subject"
          COMMITS=$(git log origin/$BASE_REF..origin/$HEAD_REF --pretty=format:"- [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) **%an**: %s")

          # 2. Get File Statistics
          # Formats as: "A  file.go" or "M  README.md"
          FILES=$(git diff --name-status origin/$BASE_REF..origin/$HEAD_REF)

          # 3. Calculate simple stats
          CHANGED_COUNT=$(echo "$FILES" | wc -l)
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l)

          # 4. Construct the Markdown Message
          # We use a Heredoc (EOF) to build the multi-line string

          # Note: We put the content in a variable first
          REPORT=$(cat <<EOF
          ## 🚀 Release Candidate Summary

          Here is the automation report for your review before merging into **$BASE_REF**.

          ### 📈 Statistics
          - **Commits:** $COMMIT_COUNT
          - **Files Changed:** $CHANGED_COUNT

          ### 📂 Changed Files
          <details>
          <summary>Click to expand file list</summary>

          \`\`\`diff
          $FILES
          \`\`\`
          </details>

          ### 📝 Commit History
          <details>
          <summary>Click to expand commit log</summary>

          $COMMITS
          </details>

          ---
          *Generated by GitHub Actions for Release Verification*
          EOF
          )

          # 5. Post (or Update) the Comment
          # We use 'gh pr comment' with --edit-last if possible, or create new.
          # To keep it simple, we will just post a new one.
          # If you want to update an existing one, it requires finding the comment ID first.

          # Simple version: Just post
          gh pr comment $PR_NUMBER --body "$REPORT"

      - name: Request Review
        run: |
          if [ "$PR_AUTHOR" != "$REVIEWER" ]; then
            echo "Requesting review from $REVIEWER..."
            gh pr edit $PR_NUMBER --add-reviewer "$REVIEWER"
          fi
          gh pr edit $PR_NUMBER --add-label "$PR_LABEL"